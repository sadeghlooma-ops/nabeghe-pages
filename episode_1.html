<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>اپیزود 1</title>

    <style>
        body {
            font-family: tahoma;
            text-align: center;
            margin-top: 100px;
            background: #f5f5f5;
        }

        .box {
            background: white;
            width: 80%;
            max-width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        button {
            font-size: 20px;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }

        .read-btn {
            background: #4CAF50;
            color: white;
        }

        .back-btn {
            background: #2196F3;
            color: white;
        }

        #message {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            line-height: 2;
        }
    </style>

</head>

<body>

    <div class="box">

        <h1>اپیزود 1</h1>

        <div id="message"></div>

        <p>
            برای ورود به داستان روی دکمه زیر بزنید.
        </p>

        <br>

        <a href="https://telegra.ph/%D8%B1%D9%85%D8%A7%D9%86-%D9%86%D8%A7%D8%A8%D8%BA%D9%87---%D8%A7%D9%BE%DB%8C%D8%B2%D9%88%D8%AF-1-05-09" target="_blank">
            <button class="read-btn">
                📖 ورود به اپیزود
            </button>
        </a>

        <br>

        <button class="back-btn" onclick="goBackToBot()">
            🔙 بازگشت به ربات
        </button>

        <div id="status" style="margin-top:15px; font-size:18px; color:#555;"></div>

    </div>

    <script>
        const messageBox = document.getElementById("message");
        const statusBox = document.getElementById("status");
        const visitKey = "episode1_visited";

        if (sessionStorage.getItem(visitKey)) {
            messageBox.innerHTML =
                "✅ از اینکه این اپیزود را خواندید متشکریم.<br>می‌توانید دوباره وارد داستان شوید یا به ربات بازگردید.";
        } else {
            messageBox.innerHTML = "🌟 به اپیزود 1 خوش آمدید.";
            sessionStorage.setItem(visitKey, "true");
        }

        function goBackToBot() {
            statusBox.innerHTML = "⏳ در حال بازگشت به ربات تلگرام… لطفاً صبر کنید و به تلگرام سوئیچ کنید.";
            // باز کردن ربات تلگرام
            window.location.href = "tg://resolve?domain=Majid_SDG_bot&start=menu";
        }
    </script>

</body>

</html>
