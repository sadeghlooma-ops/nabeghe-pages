<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>اپیزود پنجم</title>

    <style>
        body{
            font-family:tahoma;
            text-align:center;
            margin-top:100px;
            background:#f5f5f5;
        }

        .box{
            background:white;
            width:80%;
            max-width:500px;
            margin:auto;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            font-size:22px;
            padding:15px 30px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        #message{
            font-size:20px;
            color:#333;
            margin-bottom:25px;
            line-height:2;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>اپیزود پنجم</h1>

    <div id="message"></div>

    <a href="https://telegra.ph/%D8%B1%D9%85%D8%A7%D9%86-%D9%86%D8%A7%D8%A8%D8%BA%D9%87---%D8%A7%D9%BE%DB%8C%D8%B2%D9%88%D8%AF-%D9%BE%D9%86%D8%AC%D9%85-05-14">
        <button>
            📖 ورود به اپیزود
        </button>
    </a>

</div>

<script>
    const messageBox = document.getElementById("message");
    const visitKey = "episode5_visited";

    if(sessionStorage.getItem(visitKey)){
        // پیام دوم – بازگشت از تلگراف
        messageBox.innerHTML =
            "✅ از اینکه این اپیزود را خواندید متشکریم.<br>می‌توانید با زدن روی دکمه زیر دوباره وارد داستان شوید.<br>وگرنه چنانچه برگردید به صفحه ربات خواهید رفت و آنجا میتوانید با شخصیت ها گفتگو کنید";
    } else {
        // پیام اول – ورود اولیه
        messageBox.innerHTML =
            "🌟 به اپیزود پنجم رمان نابغه خوش آمدید.<br>برای ورود به داستان روی دکمه زیر بزنید.";
        sessionStorage.setItem(visitKey , "true");
    }
</script>

</body>
</html>
